name: Build desktop app

on:
  push:
    branches: [main]
    paths: ["desktop/**", ".github/workflows/build-desktop.yml"]
    tags: ["v*"]
  pull_request:
    paths: ["desktop/**"]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: build:mac
            artifact: mac-dmg
            glob: desktop/release/*.dmg
          - os: windows-latest
            script: build:win
            artifact: win-installer
            glob: desktop/release/*.exe
          - os: ubuntu-latest
            script: build:linux
            artifact: linux-appimage
            glob: desktop/release/*.AppImage
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.script }}
        env:
          # No Apple Developer ID / code-signing cert in this repo's secrets —
          # build unsigned rather than have electron-builder hunt for one in the
          # runner's keychain. Same effect on Windows (no Authenticode cert).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crucible12-${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            > [!IMPORTANT]
            > **None of these builds are code-signed** — no paid Apple Developer ID or Windows Authenticode/EV certificate behind this project. That causes different friction per OS:
            >
            > **macOS** will say `"Crucible12" is damaged and can't be opened.` It isn't — no "Open Anyway" option anywhere, including System Settings. **Before opening the `.dmg`**, run this in Terminal — needed for every fresh download, the quarantine flag is per-file:
            > ```
            > xattr -cr ~/Downloads/Crucible12*.dmg
            > ```
            > Then open the dmg and drag the app to Applications normally.
            >
            > **Windows** SmartScreen's warning has a real bypass: "More info" → "Run anyway." But the unsigned NSIS installer can also get flagged/quarantined by Defender or other antivirus as an actual detection, not just a warning. If so, grab the **portable** build below instead (`Crucible12-<version>-portable.exe` — installs nothing, far less likely to trip the same heuristic), or restore the file from Windows Security → Protection history if it was quarantined. It's a false positive, not a real problem with the file.
